<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Query — Data Analytics Chatbot</title>
<style>
  :root {
    --bg: #020617;
    --panel: #0f172acc;
    --border: #1e293b;
    --border-soft: #1e293b99;
    --teal: #2dd4bf;
    --teal-dim: #2dd4bf26;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --text-faint: #64748b;
    --bubble-bot: #1e293bcc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* ── Auth screen ── */
  #auth-screen {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 12px;
    background: var(--teal-dim); border: 1px solid #2dd4bf4d;
    display: flex; align-items: center; justify-content: center;
    color: var(--teal); font-size: 18px;
  }
  .logo-title { color: var(--text); font-weight: 600; font-size: 14px; }
  .logo-sub { color: var(--text-faint); font-size: 11px; font-family: monospace; }

  .tab-row {
    display: flex; gap: 6px;
    background: #1e293b80; border-radius: 12px; padding: 4px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1; padding: 8px; border: none; border-radius: 9px;
    font-size: 13px; cursor: pointer; transition: background 0.15s;
    background: transparent; color: var(--text-dim);
  }
  .tab-btn.active { background: var(--teal); color: #0f172a; font-weight: 600; }

  .auth-hint { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }

  .field-wrap { position: relative; margin-bottom: 10px; }
  .field-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-faint); font-size: 14px; pointer-events: none;
  }
  .auth-input {
    width: 100%; background: #1e293bb3; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px 10px 36px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .auth-input:focus { box-shadow: 0 0 0 2px #2dd4bf80; }
  .auth-input::placeholder { color: var(--text-faint); }

  .auth-submit {
    width: 100%; background: var(--teal); border: none;
    border-radius: 12px; padding: 11px;
    color: #0f172a; font-weight: 600; font-size: 14px;
    cursor: pointer; margin-top: 4px; transition: background 0.15s;
  }
  .auth-submit:hover { background: #5eead4; }
  .auth-submit:disabled { background: #334155; cursor: not-allowed; }

  .auth-msg { font-size: 12px; margin-top: 8px; }
  .auth-msg.error { color: #f87171; }
  .auth-msg.success { color: var(--teal); }

  /* ── Chat screen ── */
  #chat-screen {
    display: none;
    width: 100%;
    max-width: 680px;
    height: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    flex-direction: column;
    overflow: hidden;
  }
  #chat-screen.visible { display: flex; }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: #0f172ad9;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal); animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .credits-badge {
    margin-left: auto;
    font-size: 11px; color: var(--teal);
    background: var(--teal-dim); border: 1px solid #2dd4bf4d;
    border-radius: 20px; padding: 4px 10px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .logout-btn {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 16px; padding: 4px; margin-left: 8px;
  }
  .logout-btn:hover { color: var(--text-dim); }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .msg-row { display: flex; margin-bottom: 14px; }
  .msg-row.user { justify-content: flex-end; }
  .bubble {
    max-width: 85%; padding: 11px 15px;
    border-radius: 16px; font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.user {
    background: var(--teal); color: #0f172a;
    border-radius: 16px 16px 4px 16px;
  }
  .bubble.bot {
    background: var(--bubble-bot); color: var(--text);
    border: 1px solid var(--border-soft);
    border-radius: 16px 16px 16px 4px;
  }
  .bot-label {
    color: var(--teal); font-size: 10px;
    font-family: monospace; letter-spacing: 0.06em;
    margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
  }
  .typing span {
    display: inline-block; width: 5px; height: 5px;
    background: var(--teal); border-radius: 50%; margin: 0 1px;
    animation: bounce 0.9s infinite;
  }
  .typing span:nth-child(2){ animation-delay:.15s }
  .typing span:nth-child(3){ animation-delay:.3s }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  .suggestions { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }
  .sug-btn {
    text-align: left; font-size: 12px; color: #cbd5e1;
    background: #1e293b80; border: 1px solid var(--border-soft);
    border-radius: 11px; padding: 9px 13px; cursor: pointer; transition: background .15s;
  }
  .sug-btn:hover { background: #1e293b; }

  .input-area {
    padding: 14px; border-top: 1px solid var(--border);
    background: #0f172ad9; display: flex; gap: 8px; flex-shrink: 0;
  }
  #msg-input {
    flex: 1; background: #1e293bb3; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 15px;
    color: var(--text); font-size: 14px; outline: none;
  }
  #msg-input:focus { box-shadow: 0 0 0 2px #2dd4bf80; }
  #msg-input::placeholder { color: var(--text-faint); }
  #send-btn {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--teal); border: none; border-radius: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #send-btn:hover { background: #5eead4; }
  #send-btn:disabled { background: #334155; cursor: not-allowed; }

  /* ── Buy credits modal ── */
  #credits-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 50;
    align-items: center; justify-content: center; padding: 16px;
  }
  #credits-modal.visible { display: flex; }
  .modal-box {
    width: 100%; max-width: 340px;
    background: #0f172a; border: 1px solid var(--border);
    border-radius: 24px; padding: 22px; position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--text-faint);
    font-size: 18px; cursor: pointer;
  }
  .pack-btn {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    background: #1e293b80; border: 1px solid var(--border-soft);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
    cursor: pointer; transition: background .15s;
  }
  .pack-btn:hover { background: #1e293b; }
  .pack-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .pack-label { color: var(--text); font-size: 14px; font-weight: 500; text-align: left; }
  .pack-tag { color: var(--teal); font-size: 10px; font-family: monospace; }
  .pack-price { color: var(--text-dim); font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="logo-row">
    <div class="logo-icon">▣</div>
    <div>
      <div class="logo-title">Query</div>
      <div class="logo-sub">data analytics chatbot</div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" id="tab-signup" onclick="setMode('signup')">Sign up</button>
    <button class="tab-btn" id="tab-login" onclick="setMode('login')">Log in</button>
  </div>

  <p class="auth-hint" id="auth-hint">Create an account to get 5 free questions.</p>

  <form id="auth-form" onsubmit="handleAuth(event)">
    <div class="field-wrap">
      <span class="field-icon">✉</span>
      <input class="auth-input" type="email" id="auth-email" placeholder="you@email.com" required />
    </div>
    <div class="field-wrap">
      <span class="field-icon">🔒</span>
      <input class="auth-input" type="password" id="auth-password" placeholder="Password (min 6 characters)" minlength="6" required />
    </div>
    <div id="auth-msg"></div>
    <button class="auth-submit" type="submit" id="auth-btn">Create account</button>
  </form>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="logo-icon" style="width:36px;height:36px;border-radius:12px;background:var(--teal-dim);border:1px solid #2dd4bf4d;display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:18px">▣</div>
    <div>
      <div style="color:var(--text);font-weight:600;font-size:14px">Query</div>
      <div style="color:var(--text-faint);font-size:11px;font-family:monospace">data analytics chatbot</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;color:#2dd4bfcc;font-size:11px;font-family:monospace;margin-left:auto">
      <span class="status-dot"></span>online
    </div>
    <div class="credits-badge" onclick="showModal()" id="credits-badge">⚡ … left</div>
    <button class="logout-btn" onclick="handleLogout()" title="Log out">⏻</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msg-input" type="text" placeholder="Ask about SQL, stats, Power BI, Python..." />
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<!-- Buy Credits Modal -->
<div id="credits-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="hideModal()">✕</button>
    <div style="color:var(--teal);font-size:14px;font-weight:600;margin-bottom:4px">⚡ Buy questions</div>
    <p style="color:var(--text-faint);font-size:12px;margin-bottom:16px">Top up to keep asking Query.</p>
    <button class="pack-btn" onclick="buyPack('small')">
      <div><div class="pack-label">20 questions</div></div>
      <div class="pack-price">₦500</div>
    </button>
    <button class="pack-btn" onclick="buyPack('medium')">
      <div><div class="pack-label">50 questions</div><div class="pack-tag">Best value</div></div>
      <div class="pack-price">₦1,000</div>
    </button>
    <button class="pack-btn" onclick="buyPack('large')">
      <div><div class="pack-label">120 questions</div></div>
      <div class="pack-price">₦2,000</div>
    </button>
    <div id="modal-error" style="color:#f87171;font-size:12px;margin-top:8px"></div>
    <p style="color:#475569;font-size:10px;margin-top:14px;text-align:center">Secure payment via Paystack. Cards, bank transfer, and USSD accepted.</p>
  </div>
</div>

<script>
// ── CONFIG — replace these with your actual values ──
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

const SUGGESTIONS = [
  "What's the difference between SQL JOIN types?",
  "Explain p-value in simple terms",
  "When should I use a bar chart vs histogram?",
  "What is data normalization?",
];

// ── Supabase helpers (no SDK needed, raw fetch) ──
async function sbFetch(path, method, body, token) {
  const headers = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${token || SUPABASE_ANON_KEY}`,
  };
  const res = await fetch(SUPABASE_URL + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  return res.json();
}

async function signUp(email, password) {
  return sbFetch("/auth/v1/signup", "POST", { email, password });
}
async function signIn(email, password) {
  return sbFetch("/auth/v1/token?grant_type=password", "POST", { email, password });
}
async function getCredits(userId, token) {
  const data = await sbFetch(`/rest/v1/user_credits?id=eq.${userId}&select=credits_remaining`, "GET", null, token);
  return Array.isArray(data) ? data[0]?.credits_remaining ?? 0 : 0;
}

// ── State ──
let authMode = "signup";
let session = null;
let credits = null;
let history = [];
let isLoading = false;

// ── Auth ──
function setMode(mode) {
  authMode = mode;
  document.getElementById("tab-signup").className = "tab-btn" + (mode === "signup" ? " active" : "");
  document.getElementById("tab-login").className = "tab-btn" + (mode === "login" ? " active" : "");
  document.getElementById("auth-hint").textContent = mode === "signup"
    ? "Create an account to get 5 free questions."
    : "Welcome back — log in to continue.";
  document.getElementById("auth-btn").textContent = mode === "signup" ? "Create account" : "Log in";
  setAuthMsg("", "");
}

function setAuthMsg(text, type) {
  const el = document.getElementById("auth-msg");
  el.className = "auth-msg " + type;
  el.textContent = text;
}

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const btn = document.getElementById("auth-btn");
  btn.disabled = true;
  btn.textContent = "Please wait...";
  setAuthMsg("", "");

  try {
    if (authMode === "signup") {
      const data = await signUp(email, password);
      if (data.error) throw new Error(data.error?.message || data.msg || "Sign up failed");
      if (data.access_token) {
        startSession(data);
      } else {
        setAuthMsg("Check your email to confirm, then log in.", "success");
        setMode("login");
      }
    } else {
      const data = await signIn(email, password);
      if (data.error) throw new Error(data.error?.message || data.msg || "Login failed");
      startSession(data);
    }
  } catch (err) {
    setAuthMsg(err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === "signup" ? "Create account" : "Log in";
  }
}

async function startSession(data) {
  session = data;
  credits = await getCredits(data.user.id, data.access_token);
  updateCreditsBadge();
  showChat();
}

function showChat() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("chat-screen").classList.add("visible");
  const msgs = document.getElementById("messages");
  msgs.innerHTML = "";
  history = [];
  appendBot("Hey, I'm Query — your data analytics study buddy. Ask me about SQL, statistics, Excel, Power BI, Tableau, Python, or anything else on the path from raw data to insight.");
  renderSuggestions();
}

function handleLogout() {
  session = null; credits = null; history = [];
  document.getElementById("chat-screen").classList.remove("visible");
  document.getElementById("auth-screen").style.display = "";
  setMode("signup");
}

// ── Credits ──
function updateCreditsBadge() {
  document.getElementById("credits-badge").textContent = `⚡ ${credits ?? "…"} left`;
}
function showModal() { document.getElementById("credits-modal").classList.add("visible"); }
function hideModal() { document.getElementById("credits-modal").classList.remove("visible"); }

async function buyPack(packId) {
  document.getElementById("modal-error").textContent = "";
  try {
    const res = await fetch("/api/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ accessToken: session.access_token, packId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not start payment");
    window.location.href = data.authorizationUrl;
  } catch (err) {
    document.getElementById("modal-error").textContent = err.message;
  }
}

// ── Chat ──
function appendBot(text) {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="bubble bot"><div class="bot-label">▣ QUERY</div><span>${escHtml(text)}</span></div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
  return row;
}
function appendUser(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
}
function appendTyping() {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="bubble bot"><div class="bot-label">▣ QUERY</div><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
  return row;
}
function renderSuggestions() {
  const wrap = document.createElement("div");
  wrap.className = "suggestions";
  SUGGESTIONS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "sug-btn";
    btn.textContent = s;
    btn.onclick = () => { wrap.remove(); sendMessage(s); };
    wrap.appendChild(btn);
  });
  document.getElementById("messages").appendChild(wrap);
}
function scrollBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}
function escHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

async function sendMessage(text) {
  const userText = (text || document.getElementById("msg-input").value).trim();
  if (!userText || isLoading || !session) return;

  if (credits !== null && credits <= 0) { showModal(); return; }

  document.getElementById("msg-input").value = "";
  appendUser(userText);
  history.push({ role: "user", content: userText });
  isLoading = true;
  document.getElementById("send-btn").disabled = true;

  const typingRow = appendTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, accessToken: session.access_token }),
    });
    const data = await res.json();

    if (res.status === 402) { typingRow.remove(); history.pop(); showModal(); return; }
    if (!res.ok) throw new Error(data.error || "Request failed");

    typingRow.querySelector(".bubble").innerHTML = `<div class="bot-label">▣ QUERY</div><span>${escHtml(data.reply)}</span>`;
    history.push({ role: "assistant", content: data.reply });
    if (typeof data.creditsRemaining === "number") { credits = data.creditsRemaining; updateCreditsBadge(); }
  } catch (err) {
    typingRow.querySelector(".bubble").innerHTML = `<div class="bot-label">▣ QUERY</div><span>Connection error — please try again.</span>`;
  } finally {
    isLoading = false;
    document.getElementById("send-btn").disabled = false;
    scrollBottom();
  }
}

document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

// Resume session if returning from Paystack payment
(async () => {
  const stored = sessionStorage.getItem("qsession");
  if (stored && window.location.search.includes("trxref")) {
    session = JSON.parse(stored);
    setTimeout(async () => {
      credits = await getCredits(session.user.id, session.access_token);
      updateCreditsBadge();
    }, 2500);
    showChat();
  }
})();
</script>
</body>
</html>
